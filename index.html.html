<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A-Forward Sales Dashboard</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f5f7fa;color:#222}header{background:#111827;color:#fff;padding:14px 20px}main{padding:20px}.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 14px rgba(0,0,0,.08);max-width:700px;margin:auto}.btn{background:#2563eb;color:#fff;border:none;padding:12px 16px;border-radius:10px;cursor:pointer}.muted{color:#666}.ok{color:green}.err{color:#b91c1c}</style>
</head>
<body>
<header><h2>A-Forward Sales Dashboard</h2></header>
<main>
<div class="card">
<h3>System Ready</h3>
<p class="muted">GitHub Pages compatible starter file with secure location flow.</p>
<p id="status">Waiting for location permission...</p>
<button class="btn" onclick="requestLocation()">Allow Location</button>
<hr>
<div id="login" style="display:none">
<h4>Login</h4>
<input id="user" placeholder="Username" style="padding:10px;width:100%;margin:6px 0">
<input id="pass" type="password" placeholder="Password" style="padding:10px;width:100%;margin:6px 0">
<button class="btn" onclick="login()">Login</button>
</div>
</div>
</main>
<script>
let userLocation=null;
function setStatus(msg,cls=''){const el=document.getElementById('status');el.className=cls;el.textContent=msg;}
function requestLocation(){
 if(location.protocol!=='https:' && location.hostname!=='localhost'){setStatus('Use HTTPS GitHub Pages URL for location permissions.','err');return;}
 if(!navigator.geolocation){setStatus('Geolocation not supported in this browser.','err');return;}
 setStatus('Requesting location...');
 navigator.geolocation.getCurrentPosition(function(pos){
   userLocation={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};
   setStatus('Location granted successfully.','ok');
   document.getElementById('login').style.display='block';
 },function(err){
   setStatus('Location failed: '+err.message,'err');
 },{enableHighAccuracy:true,timeout:20000,maximumAge:0});
}
function login(){
 const u=document.getElementById('user').value.trim();
 const p=document.getElementById('pass').value.trim();
 if(!u||!p){alert('Enter username and password');return;}
 alert('Login flow ready. Connect Firebase here.');
}
</script>
</body>
</html>
